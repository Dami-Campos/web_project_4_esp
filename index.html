<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Al rededor de los EEUU</title>
</head>
<body class="page">
  <section id="popup" class="popup">
    <div class="popup__close"><button class="popup__close-button" type="button" id="close"><img src="./images/close_icon.png" alt="Cerrar página"></button></div>
    <div class="popup__container">
      <h3 class="popup__header">Editar perfil</h3>
      <form id="form" class="popup__form" name="register">
      <input id="name" class="popup__name" type="text" name="Nombre" placeholder="Nombre">
      <input id="job" class="popup__job" type="text" name="Acerca de mi" placeholder="Acerca de mi">
      <button class="popup__save" type="submit">Guardar</button>
      </form>
      </div> 
  </section>
  <header class="header">
    <img class="header__vector" src="./images/Vector.png" alt="Around the us">
    <div class="header__line"></div>
  </header>
  <section class="profile">
    <div class="profile__avatar">
    <img class="profile__avatar-image" src="./images/Jaques Cousteau.jpg" alt="Jacques Cousteau">
    </div>
    <div class="profile__info">
    <div class="profile__name-rectangle">
    <h1 class="profile__name">Jacques Cousteau</h1>
    <div class="profile__rectangle">
    <a id="open" href="#"><button type="button" class="profile__button"><img class="profile__button-image" src="./images/main__symbol.png" alt="linea diagonal"></button></a>
    </div>
    </div>
    <h2 class="profile__explorador">Explorador</h2>
    </div>
    <div class="profile__add">
    <img class="profile__vector" src="./images/main__vector.png" alt="diminuta cruz">
    </div>
  </section>
  <section class="elements">
    <div class="element">
    <img class="element__image" src="./images/element_yosemite.jpg" alt="">
    <div class="element__group">
    <div class="element__name">Valle de Yosemite</div>
    <img class="element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
    <div class="element">
    <img class="element__image" src="./images/element_lago.png" alt="">
    <div class="element__group">
    <div class="element__name">Lago Louise</div>
    <img class=".element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
    <div class="element">
    <img class="element__image" src="./images/element_montañas.png" alt="">
    <div class="element__group">
    <div class="element__name">Montañas Calvas</div>
    <img class="element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
    <div class="element">
    <img class="element__image" src="./images/element_latemar.png" alt="">
    <div class="element__group">
    <div class="element__name">Latemar</div>
    <img class="element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
    <div class="element">
    <img class="element__image" src="./images/element_vanoise.png" alt="">
    <div class="element__group">
    <div class="element__name">Vanoise Nationa...</div>
    <img class="element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
    <div class="element">
    <img class="element__image" src="./images/element_braies.png" alt="">
    <div class="element__group">
    <div class="element__name">Lago di Braies</div>
    <img class="element__like" src="./images/vector_like.png" alt="corazón">
    </div>
    </div>
  </section>
  <footer class="footer">
    <h3 class="footer__text">© 2021 Alrededor de los EEUU</h3>
  </footer>
  <script src="./scripts/app.js"></script>
</body>
