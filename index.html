<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Al rededor de los EEUU</title>
</head>
<body class="page">
  <section id="popupProfile" class="popup__profile">
    <div class="popup__profile-close"><button class="popup__profile-closebutton" type="button" id="closeProfile"><img src="./images/close_icon.png" alt="Cerrar página"></button></div>
    <div class="popup__profile-container">
      <h3 class="popup__profile-header">Editar perfil</h3>
      <form id="formProfile" class="popup__profile-form" name="register">
      <input id="nameProfile" class="popup__profile-name" type="text" name="Nombre" placeholder="Nombre">
      <input id="jobProfile" class="popup__profile-job" type="text" name="Acerca de mi" placeholder="Acerca de mi">
      <button class="popup__profile-save" type="submit">Guardar</button>
      </form>
      </div> 
  </section>
  <section id="popupImage" class="popup__image">
    <div class="popup__image-close"><button class="popup__profile-closebutton" type="button" id="closeImage"><img src="./images/close_icon.png" alt="Cerrar página"></button></div>
    <div class="popup__image-container">
      <h3 class="popup__image-header">Editar perfil</h3>
      <form id="formImage" class="popup__image-form" name="register">
      <input id="titleImage" class="popup__image-name" type="text" name="Título" placeholder="Título">
      <input id="image" class="popup__image-job" type="text" name="Enlace de la imagen" placeholder="Enlace de la imagen">
      <button class="popup__image-save" type="submit">Crear</button>
      </form>
      </div> 
  </section>
  <section  class="popup">
    <div class="popup__close"><button class="popup__close-button" type="button" id="close"><img src="./images/close_icon.png" alt="Cerrar página"></button></div>
    <div class="popup__container">
    <img class="popup__size-image">
    <h3 class="popup__footer"></h3>
    </div>
  </section>
  <header class="header">
    <img class="header__vector" src="./images/Vector.png" alt="Around the us">
    <div class="header__line"></div>
  </header>
  <section class="profile">
    <div class="profile__avatar">
    <img class="profile__avatar-image" src="./images/Jaques Cousteau.jpg" alt="Jacques Cousteau">
    </div>
    <div class="profile__info">
    <div class="profile__name-rectangle">
    <h1 class="profile__name">Jacques Cousteau</h1>
    <div class="profile__rectangle">
    <a id="openProfile" href="#"><button type="button" class="profile__button"><img class="profile__button-image" src="./images/main__symbol.png" alt="linea diagonal"></button></a>
    </div>
    </div>
    <h2 class="profile__explorador">Explorador</h2>
    </div>
    <div id="openImage" class="profile__add">
    <img class="profile__vector" src="./images/main__vector.png" alt="diminuta cruz">
    </div>
  </section>
  <section>
  <ul class="elements"></ul>
  </section> 
<footer class="footer">
  <h3 class="footer__text">© 2021 Alrededor de los EEUU</h3>
</footer>

<template id="template">
  <li class="element">
  <img id="trash" class="element__trash"  src="images/Trash.png" alt="Bote de basura">
   <img id="open"  class="element__image" alt="Paisaje">
   <div class="element__group">
   <h2 class="element__name"></h2>
   <button class="element__like"></button>
   </div>
  </li>
</template>
<script src="./scripts/app.js"></script>
</body>
</html>
